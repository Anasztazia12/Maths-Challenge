<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Maths Challenge">
    <title>Maths Challenge - Home</title>
    <link rel="preload" as="image" href="assets/image/pophunters.webp">
    <link rel="icon" type="image/png" href="assets/image/icon.png">
    <link rel="apple-touch-icon" href="assets/image/icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-home">
    <div class="game-container home-container">
        <h1>Maths Challenge</h1>

        <section id="menu-panel">
            <div class="hamburger-menu-wrapper">
                <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <nav class="hamburger-panel hidden" id="hamburger-panel">
                    <button class="menu-item" id="menu-install-btn" hidden>Add to Home Screen</button>
                    <button class="menu-item" id="menu-edit-profile-btn">Edit Profile Name</button>
                    <button class="menu-item" id="menu-results-btn">Results</button>
                    <button class="menu-item" id="menu-logout-btn">Logout</button>
                    <button class="menu-item danger" id="menu-delete-account-btn">Delete Account</button>
                </nav>
            </div>
            <br>
            <hr>
            <p id="home-daily-note" class="subtitle home-daily-note">Your 2 daily challenges are waiting for you in Weekly Challenge ⭐</p>

            <div class="menu-buttons home-menu-buttons">
                <button class="menu-btn home-menu-btn" onclick="location.href='game.html'">Play Game</button>
                <button class="menu-btn home-menu-btn" onclick="location.href='addition.html'">Addition +</button>
                <button class="menu-btn home-menu-btn" onclick="location.href='subtraction.html'">Subtraction -</button>
                <button class="menu-btn home-menu-btn" onclick="location.href='multiplication.html'">Multiplication ×</button>
                <button class="menu-btn home-menu-btn" onclick="location.href='division.html'">Division ÷</button>
                <button class="menu-btn home-menu-btn" onclick="location.href='mixed.html'">Mixed Practice - + × ÷</button>
                <button class="menu-btn special home-menu-btn home-weekly-btn" onclick="location.href='weekly.html'">Weekly Challenge ⭐</button>
                <button class="menu-btn home-menu-btn avatar-shop-btn" id="home-avatar-shop-btn" onclick="location.href='shop.html'">
                    <span class="avatar-shop-btn-icon" aria-hidden="true">🙂👤</span>
                    <span>Avatar Shop</span>
                </button>
            </div>

            <div id="results-panel" class="auth-panel hidden">
                <p class="auth-title">Completed Tests</p>
                <p id="results-panel-title" class="auth-user-label">Profile history</p>
                <div class="results-filter-actions" role="group" aria-label="Result filters">
                    <button class="menu-btn results-filter-btn active" id="results-filter-all-btn" type="button">All</button>
                    <button class="menu-btn results-filter-btn" id="results-filter-completed-btn" type="button">Completed</button>
                    <button class="menu-btn results-filter-btn" id="results-filter-unfinished-btn" type="button">Unfinished</button>
                </div>
                <div id="results-list" class="results-list"></div>
                <div class="auth-actions results-actions">
                    <button class="menu-btn" id="results-refresh-btn" type="button">Refresh</button>
                    <button class="menu-btn special" id="results-close-btn" type="button">Close</button>
                </div>
            </div>
        </section>
    </div>

    <script src="assets/js/profile-manager.js"></script>
    <script src="assets/js/hamburger.js"></script>
    <script src="assets/js/session-guard.js"></script>
    <script src="assets/js/player-avatar-widget.js"></script>
    <script type="module" src="assets/js/firebase.js"></script>
    <script type="module" src="assets/js/register.js"></script>
    <script src="assets/js/sw-register.js"></script>
    <script src="assets/js/pwa-install.js"></script>
</body>
</html>
