name: Deploy GitHub Pages
on: push: branches: - main workflow_dispatch:
permissions: contents: read pages: write id-token: write
concurrency: group: pages cancel-in-progress: true
jobs: deploy: runs-on: ubuntu-latest
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Create firebase.public.js from GitHub Secret
    env:
      FIREBASE_WEB_CONFIG_JSON: ${{ secrets.FIREBASE_WEB_CONFIG_JSON }}
    run: |
      if [ -z "$FIREBASE_WEB_CONFIG_JSON" ]; then
        echo "FIREBASE_WEB_CONFIG_JSON is missing. Add it in: Settings -> Secrets and variables -> Actions."
        exit 1
      fi

      printf "export const firebaseConfig = %s;\n" "$FIREBASE_WEB_CONFIG_JSON" > firebase.public.js

  - name: Configure Pages
    uses: actions/configure-pages@v5

  - name: Upload artifact
    uses: actions/upload-pages-artifact@v3
    with:
      path: .

  - name: Deploy to GitHub Pages
    id: deployment
    uses: actions/deploy-pages@v4