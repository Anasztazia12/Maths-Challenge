<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Challenge</title>
    <link rel="preload" as="image" href="pophunters.webp">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-home">

    <div class="game-container home-container">

        <h1>Maths Challenge</h1>
        <p class="subtitle">Choose what you want to practice today!</p>
        <p id="home-daily-note" class="subtitle home-daily-note">Your daily 2 tasks are waiting for you in Weekly Challenge ⭐</p>

        <div class="menu-buttons home-menu-buttons">

            <!-- Main Game -->
            <button class="menu-btn home-menu-btn" onclick="location.href='game.html'">
                Play Game
            </button>

            <!-- Individual Operations -->
            <button class="menu-btn home-menu-btn" onclick="location.href='addition.html'">
                Addition +
            </button>
            <button class="menu-btn home-menu-btn" onclick="location.href='subtraction.html'">
                Subtraction -
            </button>
            <button class="menu-btn home-menu-btn" onclick="location.href='multiplication.html'">
                Multiplication ×
            </button>
            <button class="menu-btn home-menu-btn" onclick="location.href='division.html'">
                Division ÷
            </button>
            <button class="menu-btn home-menu-btn" onclick="location.href='mixed.html'">
                Mixed Practice
            </button>

            <!-- Weekly Challenge -->
            <button class="menu-btn special home-menu-btn home-weekly-btn" onclick="location.href='weekly.html'">
                Weekly Challenge ⭐
            </button>

        </div>

    </div>

    <script>
        const WEEKLY_TOTAL_TASKS = 10;
        const DAILY_LIMIT = 2;

        function getCurrentDayKey() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            return `${year}-${month}-${day}`;
        }

        function getCurrentWeekKey() {
            const now = new Date();
            const utcDate = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayNumber = utcDate.getUTCDay() || 7;
            utcDate.setUTCDate(utcDate.getUTCDate() + 4 - dayNumber);

            const yearStart = new Date(Date.UTC(utcDate.getUTCFullYear(), 0, 1));
            const weekNumber = Math.ceil((((utcDate - yearStart) / 86400000) + 1) / 7);

            return `${utcDate.getUTCFullYear()}-W${String(weekNumber).padStart(2, "0")}`;
        }

        function getSafeWeeklyProgress() {
            const currentWeekKey = getCurrentWeekKey();
            const storedWeekKey = localStorage.getItem("weeklyWeekKey");

            if (storedWeekKey !== currentWeekKey) {
                return { completed: 0, byDay: {} };
            }

            const raw = localStorage.getItem("weeklyProgress");
            if (!raw) return { completed: 0, byDay: {} };

            try {
                const parsed = JSON.parse(raw);
                return {
                    completed: Math.max(0, Math.min(WEEKLY_TOTAL_TASKS, Number(parsed?.completed) || 0)),
                    byDay: parsed && typeof parsed.byDay === "object" && parsed.byDay ? parsed.byDay : {}
                };
            } catch {
                return { completed: 0, byDay: {} };
            }
        }

        function updateHomeDailyNote() {
            const noteEl = document.getElementById("home-daily-note");
            if (!noteEl) return;

            const progress = getSafeWeeklyProgress();
            const completed = progress.completed;
            const todayKey = getCurrentDayKey();
            const todayCount = Math.max(0, Math.min(DAILY_LIMIT, Number(progress.byDay?.[todayKey] || 0)));

            if (completed >= WEEKLY_TOTAL_TASKS) {
                noteEl.innerText = "Weekly Challenge complete! You finished 10/10 tasks this week. 🏆";
                return;
            }

            if (todayCount >= DAILY_LIMIT) {
                noteEl.innerText = `Great job! Today is done (${todayCount}/${DAILY_LIMIT}). Come back tomorrow for the next tasks.`;
                return;
            }

            if (todayCount === 1) {
                noteEl.innerText = "You completed 1/2 tasks today. One more is waiting in Weekly Challenge ⭐";
                return;
            }

            noteEl.innerText = "Your daily 2 tasks are waiting for you in Weekly Challenge ⭐";
        }

        updateHomeDailyNote();
    </script>

    <script src="sw-register.js"></script>
</body>
</html>
