<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Challenge</title>
    <link rel="preload" as="image" href="assets/image/pophunters.webp">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-home">

    <aside id="home-corner-avatar" class="home-corner-avatar hidden" aria-label="Selected avatar"></aside>

    <div class="game-container home-container">

        <h1>Maths Challenge</h1>
        <p class="subtitle">Sign in, register, or continue as a guest.</p>

        <section id="start-panel" class="auth-panel" aria-label="Account">
            <p class="auth-title">Welcome</p>
            <p id="auth-user-label" class="auth-user-label">Choose an option to continue</p>

            <!-- Entry buttons -->
            <div id="auth-entry-actions" class="auth-actions auth-entry-actions hidden">
                <button class="menu-btn" id="auth-login-btn" type="button">Login</button>
                <button class="menu-btn" id="auth-register-btn" type="button">Registration</button>
                <button class="menu-btn special" id="auth-guest-btn" type="button">Continue as Guest</button>
            </div>

            <!-- Login Form -->
            <div id="auth-login-form" class="auth-form hidden">
                <p class="auth-title">Login</p>
                <div class="auth-grid">
                    <input id="auth-login-email" type="email" placeholder="Email" autocomplete="email">
                    <input id="auth-login-password" type="password" placeholder="Password" autocomplete="current-password">
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn" id="auth-login-back-btn" type="button">Back</button>
                    <button class="menu-btn special" id="auth-login-submit-btn" type="button">Login</button>
                </div>
                <button class="link-btn" id="auth-login-forgot-btn" type="button">Forgot Password?</button>
                <p id="auth-login-status" class="auth-status"></p>
            </div>

            <!-- Reset Password Form -->
            <div id="auth-reset-form" class="auth-form hidden">
                <p class="auth-title">Reset Password</p>
                <div class="auth-grid">
                    <input id="auth-reset-email" type="email" placeholder="Email" autocomplete="email">
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn" id="auth-reset-back-btn" type="button">Back</button>
                    <button class="menu-btn special" id="auth-reset-send-btn" type="button">Send Code</button>
                </div>
                <p id="auth-reset-status" class="auth-status"></p>
            </div>

            <!-- Verify Reset Code Form -->
            <div id="auth-verify-reset-form" class="auth-form hidden">
                <p class="auth-title">Enter Code</p>
                <div class="auth-grid">
                    <input id="auth-verify-code" type="text" inputmode="numeric" placeholder="Enter code from email" autocomplete="one-time-code">
                    <input id="auth-new-password" type="password" placeholder="New Password" autocomplete="new-password">
                    <input id="auth-confirm-password" type="password" placeholder="Confirm Password" autocomplete="new-password">
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn" id="auth-verify-back-btn" type="button">Back</button>
                    <button class="menu-btn special" id="auth-verify-submit-btn" type="button">Change Password</button>
                </div>
                <p id="auth-verify-status" class="auth-status"></p>
            </div>

            <!-- Registration Form -->
            <div id="auth-register-form" class="auth-form hidden">
                <p class="auth-title">Registration</p>
                <div class="auth-grid">
                    <input id="auth-register-email" type="email" placeholder="Email" autocomplete="email">
                    <input id="auth-register-username" type="text" placeholder="Username" autocomplete="username">
                    <div class="password-field">
                        <input id="auth-register-password" type="password" placeholder="Password" autocomplete="new-password">
                        <button class="toggle-password-btn" id="auth-register-password-toggle" type="button" aria-label="Toggle password visibility">👁️</button>
                    </div>
                    <div class="password-field">
                        <input id="auth-register-password-confirm" type="password" placeholder="Confirm Password" autocomplete="new-password">
                        <button class="toggle-password-btn" id="auth-register-password-confirm-toggle" type="button" aria-label="Toggle password visibility">👁️</button>
                    </div>
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn" id="auth-register-back-btn" type="button">Back</button>
                    <button class="menu-btn special" id="auth-register-submit-btn" type="button">Register</button>
                </div>
                <p id="auth-register-status" class="auth-status"></p>
            </div>

            <p id="auth-status" class="auth-status"></p>
        </section>

        <section id="menu-panel" class="hidden">
            <p id="home-daily-note" class="subtitle home-daily-note">Your daily 2 tasks are waiting for you in Weekly Challenge ⭐</p>

            <div class="auth-panel profile-panel">
                <p class="auth-title">Active profile</p>
                <p id="profile-summary" class="auth-user-label">Loading profile...</p>
            </div>

            <div class="menu-buttons home-menu-buttons">

                <!-- Main Game -->
                <button class="menu-btn home-menu-btn" onclick="location.href='game.html'">
                    Play Game
                </button>

                <!-- Individual Operations -->
                <button class="menu-btn home-menu-btn" onclick="location.href='addition.html'">
                    Addition +
                </button>
                <button class="menu-btn home-menu-btn" onclick="location.href='subtraction.html'">
                    Subtraction -
                </button>
                <button class="menu-btn home-menu-btn" onclick="location.href='multiplication.html'">
                    Multiplication ×
                </button>
                <button class="menu-btn home-menu-btn" onclick="location.href='division.html'">
                    Division ÷
                </button>
                <button class="menu-btn home-menu-btn" onclick="location.href='mixed.html'">
                    Mixed Practice
                </button>

                <!-- Weekly Challenge -->
                <button class="menu-btn special home-menu-btn home-weekly-btn" onclick="location.href='weekly.html'">
                    Weekly Challenge ⭐
                </button>

                <button class="menu-btn home-menu-btn avatar-shop-btn" id="home-avatar-shop-btn" onclick="location.href='shop.html'">
                    <span class="avatar-shop-btn-icon" aria-hidden="true">🙂👤</span>
                    <span>Avatar Shop</span>
                </button>

            </div>

            <div class="auth-panel auth-session-panel">
                <button class="menu-btn special" id="auth-logout-btn" type="button" disabled>Logout</button>
                <button class="menu-btn danger" id="auth-delete-account-btn" type="button" disabled>Delete Account</button>
            </div>

            <div id="results-panel" class="auth-panel hidden">
                <p class="auth-title">Completed Tests</p>
                <p id="results-panel-title" class="auth-user-label">Profile history</p>
                <div id="results-list" class="results-list"></div>
                <div class="auth-actions results-actions">
                    <button class="menu-btn" id="results-refresh-btn" type="button">Refresh</button>
                    <button class="menu-btn special" id="results-close-btn" type="button">Close</button>
                </div>
            </div>
        </section>

    </div>

    <script src="profile-manager.js"></script>
    <script>
        const WEEKLY_TOTAL_TASKS = 10;
        const DAILY_LIMIT = 2;

        function getCurrentDayKey() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            return `${year}-${month}-${day}`;
        }

        function getCurrentWeekKey() {
            const now = new Date();
            const utcDate = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayNumber = utcDate.getUTCDay() || 7;
            utcDate.setUTCDate(utcDate.getUTCDate() + 4 - dayNumber);

            const yearStart = new Date(Date.UTC(utcDate.getUTCFullYear(), 0, 1));
            const weekNumber = Math.ceil((((utcDate - yearStart) / 86400000) + 1) / 7);

            return `${utcDate.getUTCFullYear()}-W${String(weekNumber).padStart(2, "0")}`;
        }

        function getSafeWeeklyProgress() {
            const profileStore = window.MathsProfileStore;
            const scopedKey = profileStore ? profileStore.getScopedStorageKey("weeklyProgress") : "weeklyProgress";
            const currentWeekKey = getCurrentWeekKey();
            const storedWeekKey = localStorage.getItem(profileStore ? profileStore.getScopedStorageKey("weeklyWeekKey") : "weeklyWeekKey");

            if (storedWeekKey !== currentWeekKey) {
                return { completed: 0, byDay: {} };
            }

            const raw = localStorage.getItem(scopedKey);
            if (!raw) return { completed: 0, byDay: {} };

            try {
                const parsed = JSON.parse(raw);
                return {
                    completed: Math.max(0, Math.min(WEEKLY_TOTAL_TASKS, Number(parsed?.completed) || 0)),
                    byDay: parsed && typeof parsed.byDay === "object" && parsed.byDay ? parsed.byDay : {}
                };
            } catch {
                return { completed: 0, byDay: {} };
            }
        }

        function updateHomeDailyNote() {
            const noteEl = document.getElementById("home-daily-note");
            if (!noteEl) return;

            const progress = getSafeWeeklyProgress();
            const completed = progress.completed;
            const todayKey = getCurrentDayKey();
            const todayCount = Math.max(0, Math.min(DAILY_LIMIT, Number(progress.byDay?.[todayKey] || 0)));

            if (completed >= WEEKLY_TOTAL_TASKS) {
                noteEl.innerText = "Weekly Challenge complete! You finished 10/10 tasks this week. 🏆";
                return;
            }

            if (todayCount >= DAILY_LIMIT) {
                noteEl.innerText = `Great job! Today is done (${todayCount}/${DAILY_LIMIT}). Come back tomorrow for the next tasks.`;
                return;
            }

            if (todayCount === 1) {
                noteEl.innerText = "You completed 1/2 tasks today. One more is waiting in Weekly Challenge ⭐";
                return;
            }

            noteEl.innerText = "Your daily 2 tasks are waiting for you in Weekly Challenge ⭐";
        }

        updateHomeDailyNote();
    </script>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="register.js"></script>
    <script src="sw-register.js"></script>
</body>
</html>
