<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Maths Challenge">
    <title>Maths Challenge</title>
    <link rel="preload" as="image" href="assets/image/pophunters.webp">
    <link rel="icon" type="image/png" href="assets/image/icon.png">
    <link rel="apple-touch-icon" href="assets/image/icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-home">

    <div class="game-container home-container">
        <h1>Maths Challenge</h1>
        <section id="start-panel" class="auth-panel" aria-label="Account">
            <!-- Entry buttons -->
            <div id="auth-entry-actions" class="auth-actions auth-entry-actions">
                <button class="menu-btn" id="auth-login-btn" type="button">Login</button>
                <button class="menu-btn" id="auth-register-btn" type="button">Registration</button>
                <button class="menu-btn special" id="auth-guest-btn" type="button">Continue as Guest</button>
            </div><!-- /auth-entry-actions -->

            <!-- Login Form -->
            <div id="auth-login-form" class="auth-form hidden">
                <p class="auth-title">Login</p>
                <div class="auth-grid">
                    <input id="auth-login-email" type="email" placeholder="Email" autocomplete="email">
                    <input id="auth-login-password" type="password" placeholder="Password" autocomplete="current-password">
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn special" id="auth-login-submit-btn" type="button">Login</button>
                    <button class="menu-btn" id="auth-login-back-btn" type="button">Back</button>
                </div>
                <button class="link-btn" id="auth-login-forgot-btn" type="button">Forgot Password?</button>
                <p id="auth-login-status" class="auth-status"></p>
            </div>

            <!-- Reset Password Form -->
            <div id="auth-reset-form" class="auth-form hidden">
                <p class="auth-title">Reset Password</p>
                <div class="auth-grid">
                    <input id="auth-reset-email" type="email" placeholder="Email" autocomplete="email">
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn" id="auth-reset-back-btn" type="button">Back</button>
                    <button class="menu-btn special" id="auth-reset-send-btn" type="button">Send Code</button>
                </div>
                <p id="auth-reset-status" class="auth-status"></p>
            </div>

            <!-- Verify Reset Code Form -->
            <div id="auth-verify-reset-form" class="auth-form hidden">
                <p class="auth-title">Enter Code</p>
                <div class="auth-grid">
                    <input id="auth-verify-code" type="text" inputmode="numeric" placeholder="Enter code from email" autocomplete="one-time-code">
                    <input id="auth-new-password" type="password" placeholder="New Password" autocomplete="new-password">
                    <input id="auth-confirm-password" type="password" placeholder="Confirm Password" autocomplete="new-password">
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn" id="auth-verify-back-btn" type="button">Back</button>
                    <button class="menu-btn special" id="auth-verify-submit-btn" type="button">Change Password</button>
                </div>
                <p id="auth-verify-status" class="auth-status"></p>
            </div>

            <!-- Registration Form -->
            <div id="auth-register-form" class="auth-form hidden">
                <p class="auth-title">Registration</p>
                <div class="auth-grid">
                    <input id="auth-register-email" type="email" placeholder="Email" autocomplete="email">
                    <input id="auth-register-username" type="text" placeholder="Username" autocomplete="username">
                    <div class="password-field">
                        <input id="auth-register-password" type="password" placeholder="Password" autocomplete="new-password">
                        <button class="toggle-password-btn" id="auth-register-password-toggle" type="button" aria-label="Toggle password visibility">👁️</button>
                    </div>
                    <div class="password-field">
                        <input id="auth-register-password-confirm" type="password" placeholder="Confirm Password" autocomplete="new-password">
                        <button class="toggle-password-btn" id="auth-register-password-confirm-toggle" type="button" aria-label="Toggle password visibility">👁️</button>
                    </div>
                </div>
                <div class="auth-actions auth-mode-actions">
                    <button class="menu-btn" id="auth-register-back-btn" type="button">Back</button>
                    <button class="menu-btn special" id="auth-register-submit-btn" type="button">Register</button>
                </div>
                <p id="auth-register-status" class="auth-status"></p>
            </div>

            <p id="auth-status" class="auth-status"></p>
        </section><!-- /start-panel -->

    </div><!-- /game-container -->

    <script src="profile-manager.js"></script>
    <script src="player-avatar-widget.js"></script>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="register.js"></script>
    <script src="sw-register.js"></script>
    <script src="pwa-install.js"></script>
</body>
</html>
