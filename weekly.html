<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Challenge</title>
    <link rel="preload" as="image" href="assets/image/background_weekly.webp">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-weekly">

    <div class="game-container">

        <h1>Weekly Challenge</h1>
        <p class="subtitle">Recommended: 2 tasks per day (up to 4 if you want to work ahead), 10 total this week, to earn the trophy!</p>

        <!-- Weekly progress -->
        <p id="weekly-progress" class="subtitle">Weekly progress: 0/10 • Today: 0/2</p>

        <div id="star-container">
            <svg id="weekly-star" width="220" height="220" viewBox="0 0 220 220" aria-hidden="true">
                <polygon id="star-outline"
                    points="110,18 135,82 204,82 148,123 169,192 110,150 51,192 72,123 16,82 85,82"
                    stroke="#ffffff"
                    stroke-width="8"
                    fill="none"
                    stroke-linejoin="round"
                />
                <polygon id="star-progress"
                    points="110,18 135,82 204,82 148,123 169,192 110,150 51,192 72,123 16,82 85,82"
                    pathLength="100"
                    stroke="#facc15"
                    stroke-width="9"
                    fill="none"
                    stroke-linejoin="round"
                    stroke-dasharray="0 100"
                />
            </svg>
        </div>

        <!-- Difficulty selection -->
        <div class="section">
            <h2>Difficulty</h2>
            <div id="weekly-difficulty-buttons" class="mode-buttons" data-selected="easy">
                <button type="button" class="mode-btn selected" data-value="easy">Easy</button>
                <button type="button" class="mode-btn" data-value="medium">Medium</button>
                <button type="button" class="mode-btn" data-value="hard">Hard</button>
            </div>
        </div>

        <!-- Operation selection -->
        <div class="section">
            <h2>Operation</h2>
            <div id="weekly-operation-buttons" class="mode-buttons" data-selected="addition">
                <button type="button" class="mode-btn selected" data-value="addition">Addition</button>
                <button type="button" class="mode-btn" data-value="subtraction">Subtraction</button>
                <button type="button" class="mode-btn" data-value="multiplication">Multiplication</button>
                <button type="button" class="mode-btn" data-value="division">Division</button>
                <button type="button" class="mode-btn" data-value="mixed">Mixed</button>
            </div>
        </div>

        <button class="menu-btn special" onclick="startWeeklyTask()">
            Start Today's Challenge ▶
        </button>

        <button class="menu-btn" onclick="goBackToHome()">
            ⬅ Back to Home
        </button>

        <div id="weekly-modal-backdrop" class="hidden" aria-hidden="true"></div>

        <!-- Trophy popup -->
        <div id="trophy-popup" class="hidden">
            <h2>Congratulations!</h2>
            <p>You completed all 10 weekly tasks!</p>
            <div id="trophy">🏆</div>
            <button class="menu-btn special" id="weekly-done-btn" type="button">Done!!</button>
            <button class="menu-btn" id="weekly-close-win-btn" type="button">Close</button>
        </div>

        <div id="weekly-result-panel" class="hidden">
            <h2>Weekly Result</h2>
            <p id="weekly-result-text">You finished all 10 tasks this week.</p>
            <button class="menu-btn special" id="weekly-result-ok-btn" type="button">Awesome!</button>
        </div>

    </div>

    <script src="profile-manager.js"></script>
    <script src="weekly.js"></script>
    <script>
        function setupButtonGroup(groupId) {
            const wrap = document.getElementById(groupId);
            const buttons = wrap ? wrap.querySelectorAll(".mode-btn") : [];

            buttons.forEach((button) => {
                button.addEventListener("click", () => {
                    wrap.dataset.selected = button.dataset.value;
                    buttons.forEach((btn) => btn.classList.remove("selected"));
                    button.classList.add("selected");
                });
            });
        }

        setupButtonGroup("weekly-difficulty-buttons");
        setupButtonGroup("weekly-operation-buttons");
    </script>
    <script src="register.js"></script>
    <script src="weekly.js"></script>
    <script src="session-guard.js"></script>
    <script src="sw-register.js"></script>
</body>
</html>
