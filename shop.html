<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Maths Challenge">
    <title>Avatar Shop</title>
    <link rel="preload" as="image" href="assets/image/background_operations.webp">
    <link rel="apple-touch-icon" href="assets/image/icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-operations">

    <aside id="shop-corner-avatar" class="shop-corner-avatar" aria-label="Selected avatar"></aside>

    <div class="game-container shop-container">
        <div class="hamburger-menu-wrapper">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="hamburger-panel hidden" id="hamburger-panel">
                <button class="menu-item" id="menu-install-btn" hidden>Add to Home Screen</button>
                <button class="menu-item" id="menu-edit-profile-btn">Edit Profile Name</button>
                <button class="menu-item" id="menu-results-btn">Results</button>
                <button class="menu-item" id="menu-logout-btn">Logout</button>
                <button class="menu-item danger" id="menu-delete-account-btn">Delete Account</button>
            </nav>
        </div>

        <h1>Avatar Shop</h1>
        <p class="subtitle">Choose a category, then tap visual item cards to equip or buy.</p>

        <p id="shop-profile-label" class="auth-user-label">Profile: -</p>
        <p id="shop-points" class="shop-points">Points: 0</p>

        <div id="shop-avatar-preview" class="shop-avatar-preview"></div>

        <section class="section shop-block">
            <h2>Category</h2>
            <div class="shop-category-header hidden" id="shop-category-header">
                <button class="menu-btn shop-back-btn" id="shop-category-back-btn" type="button">Back</button>
                <p id="shop-selected-category" class="shop-selected-category">Selected: -</p>
            </div>
            <div id="shop-category-tabs" class="shop-category-tabs"></div>
        </section>

        <section class="section shop-block" id="shop-preset-section">
            <h2>Base Avatars</h2>
            <div id="shop-preset-list" class="shop-list"></div>
        </section>

        <section class="section shop-block hidden" id="shop-wardrobe-section">
            <h2 id="shop-wardrobe-title">Wardrobe</h2>
            <div id="shop-wardrobe" class="shop-item-grid compact"></div>
        </section>

        <section class="section shop-block hidden" id="shop-market-section">
            <h2 id="shop-market-title">Shop</h2>
            <div id="shop-market" class="shop-item-grid compact"></div>
        </section>

        <p id="shop-status" class="save-status"></p>

        <button class="menu-btn" onclick="goBackToHome()">⬅ Back to Home</button>
    </div>

    <script src="profile-manager.js"></script>
    <script src="hamburger.js"></script>
    <script src="session-guard.js"></script>
    <script src="shop.js"></script>
    <script src="sw-register.js"></script>
    <script src="pwa-install.js"></script>
</body>
</html>
