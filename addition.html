<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition Practice</title>
    <link rel="preload" as="image" href="assets/image/background_operations.webp">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-operations">

    <div class="game-container">
        <h1>Addition Practice</h1>
        <p class="subtitle">Choose your difficulty and start!</p>

        <!-- Difficulty selection -->
        <div class="section">
            <h2>Difficulty</h2>
            <div id="difficulty-buttons" class="mode-buttons" data-selected="easy">
                <button type="button" class="mode-btn selected" data-value="easy">Easy (10–100)</button>
                <button type="button" class="mode-btn" data-value="medium">Medium (10–500)</button>
                <button type="button" class="mode-btn" data-value="hard">Hard (10–2000)</button>
            </div>
        </div>

        <!-- Start buttons -->
        <button class="menu-btn special" onclick="startAddition()">Start ▶</button>
        <button class="menu-btn" onclick="location.href='index.html'">⬅ Back</button>
    </div>

    <script>
        const difficultyButtonsWrap = document.getElementById("difficulty-buttons");
        const difficultyButtons = difficultyButtonsWrap ? difficultyButtonsWrap.querySelectorAll(".mode-btn") : [];

        difficultyButtons.forEach((button) => {
            button.addEventListener("click", () => {
                difficultyButtonsWrap.dataset.selected = button.dataset.value;
                difficultyButtons.forEach((btn) => btn.classList.remove("selected"));
                button.classList.add("selected");
            });
        });

        function getSelectedDifficulty() {
            return difficultyButtonsWrap?.dataset.selected || "easy";
        }

        function startAddition() {
            const diff = getSelectedDifficulty();
            const mode = "input";

            // Redirect to play.html with parameters
            location.href = `play.html?mode=${mode}&op=addition&diff=${diff}`;
        }
    </script>
    <script src="sw-register.js"></script>

</body>
</html>
