<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Runner</title>
    <link rel="preload" as="image" href="background_game.webp">
    <link rel="preload" as="image" href="background_operations.webp">
    <link rel="preload" as="image" href="background_weekly.webp">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-game">

    <div class="game-container arcade-container">

        <h1>Math Runner</h1>
        <p class="subtitle">Jump, collect apples, solve math to survive!</p>

        <div class="section">
            <h2>Difficulty</h2>
            <select id="arcade-difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div class="arcade-stats">
            <div id="arcade-target" class="arcade-chip">Target: 2 + 3 = 5</div>
            <div id="arcade-basket" class="arcade-chip">Basket: 0</div>
            <div id="arcade-score" class="arcade-chip">Score: 0</div>
            <div id="arcade-lives" class="arcade-chip">Lives: 3</div>
            <div id="arcade-combo" class="arcade-chip">Combo: x0</div>
            <div id="arcade-checkpoint" class="arcade-chip">Checkpoint: 5</div>
        </div>

        <div id="arcade-canvas-wrap">
            <canvas id="arcade-canvas" width="860" height="420"></canvas>
        </div>

        <div class="subtitle" id="arcade-help">Controls: Space / ↑ to jump • Collect apples until basket equals target.</div>

        <div id="arcade-overlay" class="hidden">
            <h2 id="arcade-overlay-title">Game Over</h2>
            <p id="arcade-overlay-text">Your final score: 0</p>
            <button class="menu-btn special" id="arcade-restart-btn">Restart ▶</button>
        </div>

        <button class="menu-btn" onclick="location.href='index.html'">
            ⬅ Back to Home
        </button>

    </div>

    <script src="arcade.js"></script>
    <script src="sw-register.js"></script>

</body>
</html>
