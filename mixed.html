<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Maths Challenge">
    <title>Mixed Practice</title>
    <link rel="preload" as="image" href="assets/image/background_operations.webp">
    <link rel="apple-touch-icon" href="assets/image/icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-operations">

    <div class="game-container">
        <div class="hamburger-menu-wrapper">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="hamburger-panel hidden" id="hamburger-panel">
                <button class="menu-item" id="menu-install-btn" hidden>⬇️ Install</button>
                <button class="menu-item" id="menu-edit-profile-btn">Edit Profile Name</button>
                <button class="menu-item" id="menu-results-btn">Results</button>
                <button class="menu-item" id="menu-logout-btn">Logout</button>
                <button class="menu-item danger" id="menu-delete-account-btn">Delete Account</button>
            </nav>
        </div>

        <h1>Mixed Practice</h1>
        <p class="subtitle">Choose difficulty and game mode!</p>

        <!-- Difficulty selection -->
        <div class="section">
            <h2>Difficulty</h2>
            <div id="difficulty-buttons" class="mode-buttons" data-selected="easy">
                <button type="button" class="mode-btn selected" data-value="easy">Easy</button>
                <button type="button" class="mode-btn" data-value="medium">Medium</button>
                <button type="button" class="mode-btn" data-value="hard">Hard</button>
            </div>
        </div>

        <!-- Start buttons -->
        <button class="menu-btn special" onclick="startMixed()">Start ▶</button>
        <button class="menu-btn" onclick="goBackOnePage()">⬅ Back</button>
    </div>

    <script src="hamburger.js"></script>
    <script>
        const difficultyButtonsWrap = document.getElementById("difficulty-buttons");
        const difficultyButtons = difficultyButtonsWrap ? difficultyButtonsWrap.querySelectorAll(".mode-btn") : [];

        difficultyButtons.forEach((button) => {
            button.addEventListener("click", () => {
                difficultyButtonsWrap.dataset.selected = button.dataset.value;
                difficultyButtons.forEach((btn) => btn.classList.remove("selected"));
                button.classList.add("selected");
            });
        });

        function getSelectedDifficulty() {
            return difficultyButtonsWrap?.dataset.selected || "easy";
        }

        function startMixed() {
            const diff = getSelectedDifficulty();
            const mode = "input";

            // Redirect to play.html with parameters
            location.href = `play.html?mode=${mode}&op=mixed&diff=${diff}`;
        }
    </script>
    <script src="profile-manager.js"></script>
    <script src="session-guard.js"></script>
    <script src="sw-register.js"></script>
    <script src="pwa-install.js"></script>

</body>
</html>
