<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Practice</title>
    <link rel="preload" as="image" href="background_operations.webp">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-operations">

    <div class="game-container">
        <h1>Mixed Practice</h1>
        <p class="subtitle">Choose difficulty and game mode!</p>

        <!-- Difficulty selection -->
        <div class="section">
            <h2>Difficulty</h2>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <!-- Game mode selection -->
        <div class="section">
            <h2>Game Mode</h2>
            <div id="mode-buttons" class="mode-buttons" data-selected="input">
                <button type="button" class="mode-btn selected" data-value="input">Type Answer</button>
                <button type="button" class="mode-btn" data-value="multiple">Multiple Choice</button>
            </div>
        </div>

        <!-- Start buttons -->
        <button class="menu-btn special" onclick="startMixed()">Start ▶</button>
        <button class="menu-btn" onclick="location.href='index.html'">⬅ Back</button>
    </div>

    <script>
        const modeButtonsWrap = document.getElementById("mode-buttons");
        const modeButtons = modeButtonsWrap ? modeButtonsWrap.querySelectorAll(".mode-btn") : [];

        modeButtons.forEach((button) => {
            button.addEventListener("click", () => {
                modeButtonsWrap.dataset.selected = button.dataset.value;
                modeButtons.forEach((btn) => btn.classList.remove("selected"));
                button.classList.add("selected");
            });
        });

        function getSelectedMode() {
            return modeButtonsWrap?.dataset.selected || "input";
        }

        function startMixed() {
            const diff = document.getElementById("difficulty").value;
            const mode = getSelectedMode();

            // Redirect to play.html with parameters
            location.href = `play.html?mode=${mode}&op=mixed&diff=${diff}`;
        }
    </script>
    <script src="sw-register.js"></script>

</body>
</html>
